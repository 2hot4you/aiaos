services:
  postgres:
    image: postgres:16-alpine
    container_name: aiaos-postgres
    environment:
      - POSTGRES_USER=aiaos
      - POSTGRES_PASSWORD=aiaos_password
      - POSTGRES_DB=aiaos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiaos"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aiaos-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
